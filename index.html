<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Mega - Oficial</title>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; padding-top: 100px; }
        
        .header { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.98); padding: 12px 15px; z-index: 1000; border-bottom: 2px solid #e50914; backdrop-filter: blur(15px); }
        .logo { color: #e50914; font-weight: 900; font-size: 22px; text-transform: uppercase; text-align: center; margin-bottom: 8px; letter-spacing: 3px; cursor: pointer; }
        #busca { width: 100%; max-width: 500px; display: block; margin: 0 auto; padding: 10px 20px; border-radius: 50px; border: 1px solid #333; background: #111; color: #fff; font-size: 15px; }

        .hero-container { width: 100%; height: 350px; position: relative; overflow: hidden; background: #080808; margin-bottom: 20px; }
        #hero-banner { width: 100%; height: 100%; background-size: cover; background-position: center top; transition: opacity 0.8s; display: flex; align-items: flex-end; opacity: 0; }
        .hero-info { background: linear-gradient(to top, #000 20%, transparent); width: 100%; padding: 40px 20px; }

        .secao { padding-left: 15px; margin-bottom: 30px; }
        .titulo-secao { font-size: 15px; font-weight: bold; color: #ffcc00; margin-bottom: 5px; border-left: 4px solid #e50914; padding-left: 10px; text-transform: uppercase; }
        .sub-t { font-size: 10px; color: #555; display: block; margin-bottom: 12px; }
        .carrossel { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .carrossel::-webkit-scrollbar { display: none; }
        
        .card { min-width: 115px; width: 115px; cursor: pointer; }
        .card img { width: 100%; height: 170px; border-radius: 6px; object-fit: cover; border: 1px solid #1a1a1a; }
        .card p { font-size: 10px; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; color: #ccc; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .backdrop-header { width: 100%; height: 40vh; background-size: cover; background-position: center; position: relative; }
        .fechar-btn { position: absolute; top: 20px; right: 20px; background: rgba(229, 9, 20, 0.9); color: #fff; border: none; padding: 8px 18px; border-radius: 50px; font-weight: bold; }
        .corpo-detalhes { padding: 20px; margin-top: -60px; background: #000; border-radius: 30px 30px 0 0; position: relative; }
        .capa-grande { width: 150px; border-radius: 10px; margin: -100px auto 15px; display: block; border: 3px solid #000; box-shadow: 0 0 20px #000; }
        
        .btn-play-web { width: 100%; background: linear-gradient(45deg, #e50914, #b20710); color: #fff; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 17px; border: none; margin-bottom: 15px; cursor: pointer; }
        .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .btn-mini { padding: 12px; border-radius: 6px; border: none; color: #fff; font-weight: bold; font-size: 11px; }

        .elenco-row { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
        .ator-card { min-width: 70px; text-align: center; }
        .ator-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #e50914; }
        .ator-card p { font-size: 9px; color: #888; margin-top: 5px; }

        .trailer-box { width: 100%; max-width: 400px; aspect-ratio: 16/9; margin: 20px auto; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .trailer-box iframe { width: 100%; height: 100%; border: none; }

        #busca-content { padding-top: 40px; }
        #lista-busca { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .btn-morto { background: #222 !important; color: #444 !important; pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo" onclick="voltarHome()">CINE MEGA</div>
        <input type="text" id="busca" placeholder="Pesquisar no Cine Mega..." onkeyup="if(event.key === 'Enter') realizarBusca()">
    </div>

    <div id="home-content">
        <div class="hero-container"><div id="hero-banner"><div class="hero-info"><h2 id="hero-titulo"></h2></div></div></div>
        
        <div class="secao">
            <div class="titulo-secao">VAI ESTREAR</div>
            <span class="sub-t">Exclusivo: Apenas Trailers de lançamentos</span>
            <div class="carrossel" id="lista-estreias"></div>
        </div>

        <div class="secao">
            <div class="titulo-secao">ADORA LIXO? VAMOS DE TRASH</div>
            <span class="sub-t">Terror raiz e monstros clássicos</span>
            <div class="carrossel" id="lista-trash"></div>
        </div>

        <div class="secao">
            <div class="titulo-secao">MAIS ASSISTIDOS</div>
            <span class="sub-t">Favoritos da comunidade</span>
            <div class="carrossel" id="lista-populares"></div>
        </div>
    </div>

    <div id="busca-content" style="display:none;">
        <div class="secao">
            <div class="titulo-secao" id="titulo-busca">RESULTADOS</div>
            <div id="lista-busca"></div>
        </div>
    </div>

    <div id="overlay">
        <div id="m-backdrop" class="backdrop-header"><button class="fechar-btn" onclick="fechar()">✕ VOLTAR</button></div>
        <div class="corpo-detalhes">
            <img id="m-capa" class="capa-grande">
            <h1 id="m-nome" style="text-align:center;"></h1>
            <div id="m-meta" style="text-align:center; color:#ffcc00; font-weight:bold; margin: 10px 0 20px;"></div>
            
            <button id="btn-main-play" class="btn-play-web" onclick="abrirPlayer()">▶ REPRODUZIR NO SITE</button>

            <div class="mini-grid">
                <button id="vlc-btn" class="btn-mini" style="background:#FF8800">VLC PLAYER</button>
                <button id="mx-btn" class="btn-mini" style="background:#0052D4">MX PLAYER</button>
            </div>

            <div style="text-align:left;">
                <div class="titulo-secao">SINOPSE</div>
                <p id="m-sinopse" style="color:#bbb; font-size: 14px; line-height: 1.6;"></p>
                <div class="titulo-secao">ELENCO</div>
                <div class="elenco-row" id="m-elenco"></div>
                <div class="titulo-secao">TRAILER</div>
                <div class="trailer-box" id="yt-frame"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "c90fb79a2f7d756a49bee848bce5f413";
        const MOTOR = "https://brave-jonis-meu-bot-cinema-7ce7d584.koyeb.app";
        let linkV = "";

        window.history.pushState(null, null, window.location.href);
        window.onpopstate = () => { if(document.getElementById('overlay').style.display == 'block') fecharSilencioso(); };

        async function api(url) { const r = await fetch(url); return await r.json(); }

        function preencher(id, dados, isEstreia = false) {
            document.getElementById(id).innerHTML = dados.map(f => `
                <div class="card" onclick="abrir(${f.id}, ${isEstreia})">
                    <img src="https://image.tmdb.org/t/p/w300${f.poster_path}" onerror="this.src='https://via.placeholder.com/300x450?text=CineMega'">
                    <p>${f.title}</p>
                </div>
            `).join('');
        }

        async function loadHome() {
            const estreias = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&primary_release_date.gte=2026-06-01&sort_by=popularity.desc`);
            preencher('lista-estreias', estreias.results, true);
            
            const trash = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&with_genres=27&release_date.lte=2000-01-01&sort_by=popularity.desc`);
            preencher('lista-trash', trash.results);

            const pop = await api(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR`);
            preencher('lista-populares', pop.results);

            let i = 0;
            const updateHero = () => {
                const f = pop.results[i];
                const b = document.getElementById('hero-banner');
                b.style.opacity = '0';
                setTimeout(() => {
                    b.style.backgroundImage = `linear-gradient(to top, #000, transparent), url(https://image.tmdb.org/t/p/original${f.backdrop_path})`;
                    document.getElementById('hero-titulo').innerText = f.title;
                    b.style.opacity = '1';
                }, 800);
                i = (i + 1) % 5;
            };
            updateHero();
            setInterval(updateHero, 9000);
        }

        async function realizarBusca() {
            const q = document.getElementById('busca').value;
            if(!q) return;
            document.getElementById('home-content').style.display = 'none';
            document.getElementById('busca-content').style.display = 'block';
            document.getElementById('titulo-busca').innerText = `RESULTADOS: ${q.toUpperCase()}`;
            const res = await api(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(q)}`);
            document.getElementById('lista-busca').innerHTML = res.results.map(f => `
                <div class="card" style="width:100%" onclick="abrir(${f.id}, false)">
                    <img src="https://image.tmdb.org/t/p/w300${f.poster_path}" style="height:150px" onerror="this.src='https://via.placeholder.com/300x450?text=CineMega'">
                    <p>${f.title}</p>
                </div>
            `).join('');
            window.scrollTo(0,0);
        }

        function voltarHome() {
            document.getElementById('busca').value = '';
            document.getElementById('home-content').style.display = 'block';
            document.getElementById('busca-content').style.display = 'none';
        }

        async function abrir(id, isEstreia) {
            window.history.pushState({view: 'detalhes'}, '');
            document.getElementById('overlay').style.display = 'block';
            const d = await api(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=pt-BR&append_to_response=videos,credits`);
            
            document.getElementById('m-nome').innerText = d.title;
            document.getElementById('m-capa').src = `https://image.tmdb.org/t/p/w300${d.poster_path}`;
            document.getElementById('m-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${d.backdrop_path})`;
            document.getElementById('m-sinopse').innerText = d.overview || "Sinopse não disponível.";
            document.getElementById('m-meta').innerText = `${d.release_date.split('-')[0]} | ⭐ ${d.vote_average.toFixed(1)} | ${d.runtime} min`;
            
            const btns = [document.getElementById('btn-main-play'), document.getElementById('vlc-btn'), document.getElementById('mx-btn')];
            btns.forEach(b => isEstreia ? b.classList.add('btn-morto') : b.classList.remove('btn-morto'));

            const trailer = d.videos.results.find(v => v.type == 'Trailer');
            document.getElementById('yt-frame').innerHTML = trailer ? `<iframe src="https://www.youtube.com/embed/${trailer.key}?rel=0" allowfullscreen></iframe>` : `<p style="text-align:center;color:#444">Trailer indisponível.</p>`;

            document.getElementById('m-elenco').innerHTML = d.credits.cast.slice(0,12).map(a => `
                <div class="ator-card"><img src="https://image.tmdb.org/t/p/w200${a.profile_path}" onerror="this.src='https://via.placeholder.com/100'"><p>${a.name}</p></div>
            `).join('');

            // --- LÓGICA SNIPER DE LIMPEZA DE TÍTULO ---
            // Remove o ano e caracteres especiais para o Motor não se perder
            let tituloLimpo = d.title.split('(')[0].trim(); 
            linkV = `${MOTOR}/buscar?titulo=${encodeURIComponent(tituloLimpo)}`;
            
            document.getElementById('vlc-btn').onclick = () => window.location.href = `intent://${linkV.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=org.videolan.vlc;end`;
            document.getElementById('mx-btn').onclick = () => window.location.href = `intent://${linkV.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=com.mxtech.videoplayer.ad;end`;
        }

        function fechar() { window.history.back(); }
        function fecharSilencioso() { document.getElementById('overlay').style.display = 'none'; document.getElementById('yt-frame').innerHTML = ''; }
        function abrirPlayer() { window.open(linkV, '_blank'); }

        loadHome();
    </script>
</body>
</html>
