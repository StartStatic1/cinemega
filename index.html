<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Mega - Oficial</title>
    <style>
        /* MANTIVE TODO O SEU DESIGN ORIGINAL */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; width: 100%; height: 100%; }
        body { padding-top: 110px; overflow-y: scroll; }
        .header { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 15px; z-index: 1000; border-bottom: 2px solid #e50914; backdrop-filter: blur(10px); }
        .logo { color: #e50914; font-weight: 900; font-size: 22px; text-transform: uppercase; text-align: center; margin-bottom: 10px; letter-spacing: 3px; cursor: pointer; }
        #busca { width: 100%; max-width: 500px; display: block; margin: 0 auto; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; -webkit-user-select: text; user-select: text; }
        .hero-container { width: 100%; height: 350px; position: relative; overflow: hidden; background: #0a0a0a; }
        #hero-banner { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 1.5s; display: flex; align-items: flex-end; }
        .hero-info { background: linear-gradient(to top, #000, transparent); width: 100%; padding: 40px 20px; }
        .secao { padding: 20px 0 10px 15px; }
        .titulo-secao { font-size: 14px; font-weight: bold; color: #ffcc00; margin-bottom: 12px; border-left: 4px solid #e50914; padding-left: 12px; text-transform: uppercase; }
        .carrossel { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scrollbar-width: none; }
        .card { flex: 0 0 auto; width: 115px; cursor: pointer; }
        .card img { width: 100%; height: 170px; border-radius: 8px; object-fit: cover; border: 1px solid #222; background: #111; }
        .card p { font-size: 10px; margin: 6px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; color: #bbb; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: scroll; }
        .backdrop-header { width: 100%; height: 40vh; background-size: cover; background-position: center; position: relative; border-bottom: 2px solid #e50914; }
        .fechar-btn { position: absolute; top: 20px; right: 20px; background: #e50914; color: #fff; border: none; padding: 10px 18px; border-radius: 50px; font-weight: bold; z-index: 3001; }
        .corpo-detalhes { padding: 20px; margin-top: -60px; background: #000; border-radius: 40px 40px 0 0; position: relative; min-height: 100vh; }
        .capa-mini { width: 140px; height: 200px; border-radius: 12px; margin: -130px auto 20px; display: block; border: 4px solid #000; object-fit: cover; box-shadow: 0 0 20px #000; }
        .btn-play-web { display: block; width: 100%; background: #e50914; color: #fff; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 16px; text-decoration: none; text-align: center; margin-bottom: 15px; text-transform: uppercase; }
        .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .btn-mini { padding: 12px; border-radius: 8px; border: none; color: #fff; font-weight: bold; font-size: 11px; cursor: pointer; text-align: center; text-decoration: none; }
        .trailer-box { width: 100%; aspect-ratio: 16/9; margin: 20px 0; border-radius: 10px; overflow: hidden; background: #111; border: 1px solid #333; }
        .trailer-box iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="header">
        <div class="logo" onclick="window.location.reload()">CINE MEGA</div>
        <input type="text" id="busca" placeholder="O que vamos assistir?" onkeyup="if(event.key === 'Enter') realizarBusca()">
    </div>

    <div id="home-content">
        <div class="hero-container"><div id="hero-banner"><div class="hero-info"><h2 id="hero-titulo">Carregando...</h2></div></div></div>
        <div class="secao"><div class="titulo-secao">MAIS ASSISTIDOS</div><div class="carrossel" id="lista-populares"></div></div>
        <div class="secao"><div class="titulo-secao">CLÁSSICOS</div><div class="carrossel" id="lista-classicos"></div></div>
    </div>

    <div id="busca-content" style="display:none; padding-top: 20px;">
        <div class="secao"><div class="titulo-secao">RESULTADOS</div><div id="lista-busca" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-right: 15px;"></div></div>
    </div>

    <div id="overlay">
        <div id="m-backdrop" class="backdrop-header"><button class="fechar-btn" onclick="fechar()">✕ VOLTAR</button></div>
        <div class="corpo-detalhes">
            <img id="m-capa" class="capa-mini">
            <h1 id="m-nome" style="text-align:center; font-size: 22px;"></h1>
            
            <a id="btn-main-play" class="btn-play-web" href="#" target="_blank">▶ REPRODUZIR AGORA</a>
            
            <div class="mini-grid">
                <a id="vlc-btn" class="btn-mini" style="background:#FF8800" href="#">VLC PLAYER</a>
                <a id="mx-btn" class="btn-mini" style="background:#0052D4" href="#">MX PLAYER</a>
            </div>

            <div class="titulo-secao">SINOPSE</div>
            <p id="m-sinopse" style="color:#bbb; font-size: 13px;"></p>
            
            <div class="titulo-secao">TRAILER</div>
            <div class="trailer-box" id="yt-frame"></div>
        </div>
    </div>

    <script>
        const API_KEY = "c90fb79a2f7d756a49bee848bce5f413";
        const MOTOR = "https://api-scraper-cinema.onrender.com"; // RENDER
        const PLAYER_VIP = "https://startstatic1.github.io/Cine-Mega-player/"; // GITHUB

        async function api(url) { const r = await fetch(url); return await r.json(); }

        function preencher(id, dados) {
            document.getElementById(id).innerHTML = dados.map(f => `
                <div class="card" onclick="abrir(${f.id})">
                    <img src="https://image.tmdb.org/t/p/w300${f.poster_path}">
                    <p>${f.title}</p>
                </div>
            `).join('');
        }

        async function loadHome() {
            const pop = await api(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR`);
            preencher('lista-populares', pop.results);
            const classicos = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&release_date.lte=1998-01-01&sort_by=vote_count.desc`);
            preencher('lista-classicos', classicos.results);
            if(pop.results[0]) {
                const f = pop.results[0];
                document.getElementById('hero-banner').style.backgroundImage = `linear-gradient(to top, #000, transparent), url(https://image.tmdb.org/t/p/original${f.backdrop_path})`;
                document.getElementById('hero-titulo').innerText = f.title;
            }
        }

        async function abrir(id) {
            document.getElementById('overlay').style.display = 'block';
            const d = await api(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=pt-BR&append_to_response=videos`);
            
            document.getElementById('m-nome').innerText = d.title;
            document.getElementById('m-capa').src = `https://image.tmdb.org/t/p/w300${d.poster_path}`;
            document.getElementById('m-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${d.backdrop_path})`;
            document.getElementById('m-sinopse').innerText = d.overview || "Sem sinopse.";
            
            const motorLink = `${MOTOR}/buscar?titulo=${encodeURIComponent(d.title)}`;
            
            // 🔥 MODO SEGURO: Abre o seu player do GitHub em nova aba passando o link da API
            const btnPlay = document.getElementById('btn-main-play');
            btnPlay.href = `${PLAYER_VIP}?video=${encodeURIComponent(motorLink)}`;

            document.getElementById('vlc-btn').href = `intent://${motorLink.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=org.videolan.vlc;end`;
            document.getElementById('mx-btn').href = `intent://${motorLink.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=com.mxtech.videoplayer.ad;end`;

            const trailer = d.videos.results.find(v => v.type === 'Trailer');
            document.getElementById('yt-frame').innerHTML = trailer ? `<iframe src="https://www.youtube.com/embed/${trailer.key}"></iframe>` : '';
        }

        function fechar() { document.getElementById('overlay').style.display = 'none'; }

        async function realizarBusca() {
            const q = document.getElementById('busca').value;
            if(!q) return;
            document.getElementById('home-content').style.display = 'none';
            document.getElementById('busca-content').style.display = 'block';
            const res = await api(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(q)}`);
            document.getElementById('lista-busca').innerHTML = res.results.map(f => `
                <div class="card" onclick="abrir(${f.id})"><img src="https://image.tmdb.org/t/p/w300${f.poster_path}"><p>${f.title}</p></div>
            `).join('');
        }

        loadHome();
    </script>
</body>
</html>
