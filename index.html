<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Mega - Oficial</title>
    
    <style>
        /* PROTEÇÃO TOTAL: Impede seleção e cópia */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            -webkit-touch-callout: none; /* Impede menu de salvar imagem */
            -webkit-user-select: none;   /* Impede seleção de texto */
            user-select: none;
        }
        
        html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; width: 100%; height: 100%; }
        body { padding-top: 110px; overflow-y: scroll; }

        .header { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 15px; z-index: 1000; border-bottom: 2px solid #e50914; backdrop-filter: blur(10px); }
        .logo { color: #e50914; font-weight: 900; font-size: 22px; text-transform: uppercase; text-align: center; margin-bottom: 10px; letter-spacing: 3px; cursor: pointer; }
        #busca { width: 100%; max-width: 500px; display: block; margin: 0 auto; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; -webkit-user-select: text; user-select: text; }

        .hero-container { width: 100%; height: 350px; position: relative; overflow: hidden; background: #0a0a0a; }
        #hero-banner { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 1.5s; display: flex; align-items: flex-end; }
        .hero-info { background: linear-gradient(to top, #000, transparent); width: 100%; padding: 40px 20px; }
        .hero-info h2 { margin: 0; font-size: 26px; font-weight: 800; }

        .secao { padding: 20px 0 10px 15px; overflow: hidden; }
        .titulo-secao { font-size: 14px; font-weight: bold; color: #ffcc00; margin-bottom: 12px; border-left: 4px solid #e50914; padding-left: 12px; text-transform: uppercase; }
        
        .carrossel { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .carrossel::-webkit-scrollbar { display: none; }
        
        .card { flex: 0 0 auto; width: 115px; cursor: pointer; }
        .card img { width: 100%; height: 170px; border-radius: 8px; object-fit: cover; border: 1px solid #222; background: #111; pointer-events: none; }
        .card p { font-size: 10px; margin: 6px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; color: #bbb; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        .backdrop-header { width: 100%; height: 40vh; background-size: cover; background-position: center; position: relative; border-bottom: 2px solid #e50914; }
        .fechar-btn { position: absolute; top: 20px; right: 20px; background: #e50914; color: #fff; border: none; padding: 10px 18px; border-radius: 50px; font-weight: bold; z-index: 3001; }
        .corpo-detalhes { padding: 20px; margin-top: -60px; background: #000; border-radius: 40px 40px 0 0; position: relative; min-height: 100vh; z-index: 2001; }
        
        .capa-mini { width: 140px; height: 200px; border-radius: 12px; margin: -130px auto 20px; display: block; border: 4px solid #000; object-fit: cover; box-shadow: 0 0 20px #000; background: #111; pointer-events: none; }
        
        #aviso-estreia { background: #ffcc00; color: #000; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: 900; text-align: center; margin-bottom: 15px; display: none; }
        
        /* BOTÃO VERMELHO ESTILO LINK DIRETO */
        .btn-play-web { display: block; width: 100%; background: #e50914; color: #fff; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 16px; text-decoration: none; text-align: center; margin-bottom: 15px; text-transform: uppercase; }
        
        .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .btn-mini { padding: 12px; border-radius: 8px; border: none; color: #fff; font-weight: bold; font-size: 11px; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-desabilitado { background: #1a1a1a !important; color: #444 !important; pointer-events: none; opacity: 0.6; }

        .elenco-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; scrollbar-width: none; }
        .ator-card { flex: 0 0 auto; width: 70px; text-align: center; }
        .ator-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #e50914; margin: 0 auto; display: block; pointer-events: none; }

        .footer { padding: 30px; text-align: center; color: #444; font-size: 11px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="header">
        <div class="logo" onclick="voltarHome()">CINE MEGA</div>
        <input type="text" id="busca" placeholder="O que vamos assistir?" onkeyup="if(event.key === 'Enter') realizarBusca()">
    </div>

    <div id="home-content">
        <div class="hero-container"><div id="hero-banner"><div class="hero-info"><h2 id="hero-titulo">Carregando...</h2></div></div></div>
        <div class="secao"><div class="titulo-secao">MAIS ASSISTIDOS</div><div class="carrossel" id="lista-populares"></div></div>
        <div class="secao"><div class="titulo-secao">VAI ESTREAR</div><div class="carrossel" id="lista-estreias"></div></div>
        <div class="secao"><div class="titulo-secao">TRASH (ÍCONES DO TERROR)</div><div class="carrossel" id="lista-trash"></div></div>
        <div class="secao"><div class="titulo-secao">VOCÊ TÁ VELHO, HEIN?</div><div class="carrossel" id="lista-classicos"></div></div>
        <footer class="footer"><strong>AVISO LEGAL:</strong> Cine Mega é um motor de indexação automático.</footer>
    </div>

    <div id="busca-content" style="display:none; padding-top: 20px;">
        <div class="secao"><div class="titulo-secao">RESULTADOS</div><div id="lista-busca" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-right: 15px;"></div></div>
    </div>

    <div id="overlay">
        <div id="m-backdrop" class="backdrop-header"><button class="fechar-btn" onclick="fechar()">✕ VOLTAR</button></div>
        <div class="corpo-detalhes">
            <img id="m-capa" class="capa-mini">
            <h1 id="m-nome" style="text-align:center; font-size: 22px; margin-bottom: 5px;"></h1>
            <div id="m-meta" style="text-align:center; color:#ffcc00; font-size: 12px; margin-bottom: 20px;"></div>
            
            <div id="aviso-estreia">🍿 ESTE TÍTULO AINDA NÃO ESTÁ DISPONÍVEL.</div>
            
            <a id="btn-main-play" class="btn-play-web" href="#">▶ REPRODUZIR NO SITE</a>
            
            <div class="mini-grid">
                <a id="vlc-btn" class="btn-mini" style="background:#FF8800" href="#">VLC PLAYER</a>
                <a id="mx-btn" class="btn-mini" style="background:#0052D4" href="#">MX PLAYER</a>
            </div>

            <div class="titulo-secao">SINOPSE</div>
            <p id="m-sinopse" style="color:#bbb; font-size: 13px; line-height: 1.6;"></p>
            <div class="titulo-secao">ELENCO</div><div class="elenco-row" id="m-elenco"></div>
            <div class="titulo-secao" style="margin-top:20px;">VOCÊ TAMBÉM PODE GOSTAR</div><div class="carrossel" id="m-rec"></div>
        </div>
    </div>

    <script>
        const API_KEY = "c90fb79a2f7d756a49bee848bce5f413";
        const MOTOR = "https://api-scraper-cinema.onrender.com";

        window.addEventListener('popstate', () => { if (document.getElementById('overlay').style.display === 'block') { fecharSilencioso(); } });

        async function api(url) { const r = await fetch(url); return await r.json(); }

        function preencher(id, dados, estreando = false) {
            document.getElementById(id).innerHTML = dados.map(f => `
                <div class="card" onclick="abrir(${f.id}, ${estreando})">
                    <img src="https://image.tmdb.org/t/p/w300${f.poster_path}" onerror="this.src='https://via.placeholder.com/115x170/111/fff?text=CineMega'">
                    <p>${f.title}</p>
                </div>
            `).join('');
        }

        async function loadHome() {
            const pop = await api(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR`);
            preencher('lista-populares', pop.results);
            
            const d = new Date(); d.setMonth(d.getMonth() + 1);
            const estreias = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&primary_release_date.gte=${d.toISOString().split('T')[0]}&sort_by=popularity.desc`);
            preencher('lista-estreias', estreias.results, true);
            
            // TRASH - Somente os Clássicos por Nome
            const trashNomes = ["Friday the 13th", "A Nightmare on Elm Street", "Child's Play", "Halloween", "It", "Hellraiser", "The Texas Chain Saw Massacre"];
            let trashData = [];
            for (let nome of trashNomes) {
                const s = await api(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(nome)}`);
                if(s.results[0]) trashData.push(s.results[0]);
            }
            preencher('lista-trash', trashData.sort(() => Math.random() - 0.5));
            
            const classicos = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&release_date.lte=1998-01-01&sort_by=vote_count.desc`);
            preencher('lista-classicos', classicos.results);

            if(pop.results[0]) {
                const f = pop.results[0];
                document.getElementById('hero-banner').style.backgroundImage = `linear-gradient(to top, #000, transparent), url(https://image.tmdb.org/t/p/original${f.backdrop_path})`;
                document.getElementById('hero-titulo').innerText = f.title;
            }
        }

        async function abrir(id, isEstreia) {
            history.pushState({page: 'detalhes'}, '');
            document.getElementById('overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            const d = await api(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=pt-BR&append_to_response=credits,recommendations`);
            
            document.getElementById('m-nome').innerText = d.title;
            document.getElementById('m-capa').src = `https://image.tmdb.org/t/p/w300${d.poster_path}`;
            document.getElementById('m-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${d.backdrop_path})`;
            document.getElementById('m-sinopse').innerText = d.overview || "Sinopse não disponível.";
            document.getElementById('m-meta').innerText = `${d.release_date.split('-')[0]} | ⭐ ${d.vote_average.toFixed(1)}`;
            
            const aviso = document.getElementById('aviso-estreia');
            const b_play = document.getElementById('btn-main-play');
            const b_vlc = document.getElementById('vlc-btn');
            const b_mx = document.getElementById('mx-btn');
            
            const hoje = new Date().toISOString().split('T')[0];
            const motorLink = `${MOTOR}/buscar?titulo=${encodeURIComponent(d.title)}`;

            if(isEstreia && d.release_date > hoje) {
                aviso.style.display = 'block';
                [b_play, b_vlc, b_mx].forEach(b => { b.classList.add('btn-desabilitado'); b.href = "#"; });
            } else {
                aviso.style.display = 'none';
                b_play.classList.remove('btn-desabilitado');
                b_play.href = motorLink;
                b_vlc.classList.remove('btn-desabilitado');
                b_vlc.href = `intent://${motorLink.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=org.videolan.vlc;end`;
                b_mx.classList.remove('btn-desabilitado');
                b_mx.href = `intent://${motorLink.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=com.mxtech.videoplayer.ad;end`;
            }

            document.getElementById('m-elenco').innerHTML = d.credits.cast.slice(0,10).map(a => `<div class="ator-card"><img src="https://image.tmdb.org/t/p/w200${a.profile_path}" onerror="this.src='https://via.placeholder.com/60'"><p>${a.name}</p></div>`).join('');
            document.getElementById('m-rec').innerHTML = d.recommendations.results.slice(0,10).map(f => `<div class="card" onclick="abrir(${f.id}, false)"><img src="https://image.tmdb.org/t/p/w300${f.poster_path}"><p>${f.title}</p></div>`).join('');
            
            document.getElementById('overlay').scrollTo(0,0);
        }

        function fecharSilencioso() { document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = ''; }
        function fechar() { history.back(); }
        function voltarHome() { window.location.reload(); }

        async function realizarBusca() {
            const q = document.getElementById('busca').value; if(!q) return;
            document.getElementById('home-content').style.display = 'none';
            document.getElementById('busca-content').style.display = 'block';
            const res = await api(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(q)}`);
            document.getElementById('lista-busca').innerHTML = res.results.map(f => `<div class="card" onclick="abrir(${f.id}, false)"><img src="https://image.tmdb.org/t/p/w300${f.poster_path}" style="height:160px"><p>${f.title}</p></div>`).join('');
        }

        loadHome();
    </script>
</body>
</html>
