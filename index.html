<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Mega - Oficial</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; padding-top: 85px; }
        
        /* HEADER FIXO */
        .header { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 15px; z-index: 1000; border-bottom: 1px solid #e50914; backdrop-filter: blur(10px); }
        .logo { color: #e50914; font-weight: 900; font-size: 24px; text-transform: uppercase; text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
        #busca { width: 100%; max-width: 500px; display: block; margin: 0 auto; padding: 12px 18px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; font-size: 15px; border: 1px solid #444; }

        /* BANNER HERO */
        .hero-container { width: 100%; height: 350px; position: relative; overflow: hidden; margin-bottom: 10px; }
        #hero-banner { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 1.5s; display: flex; align-items: flex-end; }
        .hero-info { background: linear-gradient(to top, #000, transparent); width: 100%; padding: 40px 20px; }
        .hero-info h2 { margin: 0; font-size: 26px; font-weight: 800; text-shadow: 2px 2px 4px #000; }

        /* SEÇÕES DA HOME */
        .secao { padding-left: 15px; margin-bottom: 35px; }
        .titulo-secao { font-size: 16px; font-weight: bold; color: #ffcc00; margin-bottom: 5px; border-left: 4px solid #e50914; padding-left: 10px; text-transform: uppercase; }
        .sub-t { font-size: 11px; color: #666; display: block; margin-bottom: 12px; font-style: italic; }
        .carrossel { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .carrossel::-webkit-scrollbar { display: none; }
        .card { min-width: 125px; width: 125px; cursor: pointer; }
        .card img { width: 100%; height: 185px; border-radius: 8px; object-fit: cover; border: 1px solid #222; }
        .card p { font-size: 11px; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; color: #eee; }

        /* OVERLAY DETALHES */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .backdrop-header { width: 100%; height: 45vh; background-size: cover; background-position: center; position: relative; }
        .fechar-btn { position: absolute; top: 20px; right: 20px; background: rgba(229, 9, 20, 0.9); color: #fff; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; z-index: 2100; }
        .corpo-detalhes { padding: 20px; margin-top: -60px; background: #000; border-radius: 40px 40px 0 0; position: relative; box-shadow: 0 -20px 30px #000; }
        .capa-grande { width: 160px; border-radius: 15px; margin: -110px auto 20px; display: block; border: 4px solid #000; box-shadow: 0 0 30px #000; }
        
        .btn-play-web { width: 100%; background: linear-gradient(45deg, #e50914, #ff0000); color: #fff; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 18px; border: none; margin-bottom: 15px; cursor: pointer; }
        .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .btn-mini { padding: 12px; border-radius: 10px; border: none; color: #fff; font-weight: bold; font-size: 12px; cursor: pointer; }
        .btn-morto { background: #222 !important; color: #444 !important; cursor: not-allowed !important; pointer-events: none; opacity: 0.5; }

        .trailer-box { width: 100%; max-width: 400px; aspect-ratio: 16/9; margin: 25px auto; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .trailer-box iframe { width: 100%; height: 100%; border: none; }
        .ator-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; scrollbar-width: none; }
        .ator-card { min-width: 75px; text-align: center; }
        .ator-card img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #e50914; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">CINE MEGA</div>
        <input type="text" id="busca" placeholder="Pesquisar filme..." onkeyup="if(event.key === 'Enter') realizarBusca()">
    </div>

    <div id="home-content">
        <div class="hero-container"><div id="hero-banner"><div class="hero-info"><h2 id="hero-titulo">Carregando...</h2></div></div></div>

        <div class="secao">
            <div class="titulo-secao">VAI ESTREAR</div>
            <span class="sub-t">Em breve nos cinemas (Apenas Trailers)</span>
            <div class="carrossel" id="lista-estreias"></div>
        </div>

        <div class="secao">
            <div class="titulo-secao">MAIS ASSISTIDOS</div>
            <span class="sub-t">Os favoritos da nossa comunidade</span>
            <div class="carrossel" id="lista-populares"></div>
        </div>

        <div class="secao">
            <div class="titulo-secao">ADORA LIXO? VAMOS DE TRASH</div>
            <span class="sub-t">Aqueles clássicos do lixo que a gente ama</span>
            <div class="carrossel" id="lista-trash"></div>
        </div>

        <div class="secao">
            <div class="titulo-secao">VOCÊ TÁ VELHO, HEIN?</div>
            <span class="sub-t">Relíquias dos anos 80, 90 e 2000</span>
            <div class="carrossel" id="lista-classicos"></div>
        </div>
    </div>

    <div id="overlay">
        <div id="m-backdrop" class="backdrop-header"><button class="fechar-btn" onclick="fechar()">✕ VOLTAR</button></div>
        <div class="corpo-detalhes">
            <img id="m-capa" class="capa-grande">
            <h1 id="m-nome" style="text-align:center;"></h1>
            <div id="m-meta" style="text-align:center; color:#ffcc00; font-weight:bold; margin-bottom: 20px;"></div>
            
            <button id="btn-main-play" class="btn-play-web" onclick="abrirPlayer()">▶ REPRODUZIR NO SITE</button>

            <div class="mini-grid">
                <button id="vlc-btn" class="btn-mini" style="background:#FF8800">VLC PLAYER</button>
                <button id="mx-btn" class="btn-mini" style="background:#0052D4">MX PLAYER</button>
            </div>

            <div style="text-align:left;">
                <div class="titulo-secao">SINOPSE</div>
                <p id="m-sinopse" style="color:#bbb; font-size:14px; line-height:1.6;"></p>
                <div class="titulo-secao">TRAILER</div>
                <div class="trailer-box" id="yt-frame"></div>
                <div class="titulo-secao">ELENCO</div>
                <div class="ator-row" id="m-elenco"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "c90fb79a2f7d756a49bee848bce5f413";
        const MOTOR = "https://brave-jonis-meu-bot-cinema-7ce7d584.koyeb.app";
        let linkV = "";

        // --- LÓGICA DE NAVEGAÇÃO POR GESTO (HISTÓRICO) ---
        function abrir(id, isEstreia) {
            // Cria um estado no histórico para o "voltar" do celular funcionar
            window.history.pushState({view: 'detalhes'}, ''); 
            mostrarDetalhes(id, isEstreia);
        }

        window.onpopstate = function(event) {
            // Se o usuário usar o gesto de voltar e o player estiver aberto, apenas fecha o player
            if (document.getElementById('overlay').style.display === 'block') {
                fecharSilencioso(); 
            }
        };

        function fechar() {
            // Volta o histórico e fecha a aba
            window.history.back();
        }

        function fecharSilencioso() {
            // Apenas esconde a tela sem mexer no histórico
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('yt-frame').innerHTML = '';
        }
        // ------------------------------------------------

        async function api(url) { const r = await fetch(url); return await r.json(); }

        function preencher(id, dados, isEstreia = false) {
            document.getElementById(id).innerHTML = dados.map(f => `
                <div class="card" onclick="abrir(${f.id}, ${isEstreia})">
                    <img src="https://image.tmdb.org/t/p/w300${f.poster_path}" onerror="this.src='https://via.placeholder.com/300x450?text=CineMega'">
                    <p>${f.title}</p>
                </div>
            `).join('');
        }

        async function loadHome() {
            const estreias = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&primary_release_date.gte=2026-06-01&sort_by=popularity.desc`);
            preencher('lista-estreias', estreias.results, true);

            const pop = await api(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR`);
            preencher('lista-populares', pop.results);

            const trash = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&with_genres=27,28`);
            preencher('lista-trash', trash.results);

            const classicos = await api(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&release_date.lte=2000-12-31&sort_by=popularity.desc`);
            preencher('lista-classicos', classicos.results);

            let i = 0;
            setInterval(() => {
                const f = pop.results[i];
                document.getElementById('hero-banner').style.backgroundImage = `linear-gradient(to top, #000, transparent), url(https://image.tmdb.org/t/p/original${f.backdrop_path})`;
                document.getElementById('hero-titulo').innerText = f.title;
                i = (i + 1) % 5;
            }, 8000);
        }

        async function mostrarDetalhes(id, isEstreia) {
            document.getElementById('overlay').style.display = 'block';
            const d = await api(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=pt-BR&append_to_response=videos,credits`);
            
            document.getElementById('m-nome').innerText = d.title;
            document.getElementById('m-capa').src = `https://image.tmdb.org/t/p/w300${d.poster_path}`;
            document.getElementById('m-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${d.backdrop_path})`;
            document.getElementById('m-sinopse').innerText = d.overview || "Sem sinopse disponível.";
            document.getElementById('m-meta').innerText = `${d.release_date.split('-')[0]} | ⭐ ${d.vote_average.toFixed(1)} | ${d.runtime} min`;
            
            const btns = [document.getElementById('btn-main-play'), document.getElementById('vlc-btn'), document.getElementById('mx-btn')];
            btns.forEach(b => isEstreia ? b.classList.add('btn-morto') : b.classList.remove('btn-morto'));

            const trailer = d.videos.results.find(v => v.type == 'Trailer' || v.type == 'Teaser');
            document.getElementById('yt-frame').innerHTML = trailer ? `<iframe src="https://www.youtube.com/embed/${trailer.key}?rel=0" allowfullscreen></iframe>` : `<p style="text-align:center;color:#444">Trailer indisponível.</p>`;

            document.getElementById('m-elenco').innerHTML = d.credits.cast.slice(0,10).map(a => `
                <div class="ator-card"><img src="https://image.tmdb.org/t/p/w200${a.profile_path}" onerror="this.src='https://via.placeholder.com/100'"><p>${a.name}</p></div>
            `).join('');

            linkV = `${MOTOR}/buscar?titulo=${encodeURIComponent(d.title)}`;
            document.getElementById('vlc-btn').onclick = () => window.location.href = `intent://${linkV.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=org.videolan.vlc;end`;
            document.getElementById('mx-btn').onclick = () => window.location.href = `intent://${linkV.replace(/https?:\/\//,'')}#Intent;action=android.intent.action.VIEW;scheme=http;type=video/mp4;package=com.mxtech.videoplayer.ad;end`;
        }

        function abrirPlayer() { window.open(linkV, '_blank'); }

        loadHome();
    </script>
</body>
</html>
